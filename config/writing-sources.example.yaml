# writing-sources.example.yaml — per-host-repo source & output declaration (CAP-2).
#
# Copy to <host-repo>/writing-sources.yaml (this file lives in the repo you are
# writing ABOUT, not in the plugin repo). Two things are declared here:
#
#   sources: the ONLY paths the harvest step may read. A repo not listed is
#            never traversed, even if it sits next to this one on disk. Paths
#            resolve against the host-repo root, not the process working dir.
#   output:  where the pipeline writes drafts. There is no fixed `drafts/`
#            default — an absent output key makes the pipeline ask once and
#            offer to write your answer back into this file.

sources:
  - path: .                              # the host repo itself (whole tree in scope)
    # Recommended for a whole-repo scope: add an `include:` allowlist so harvest
    # reads only article material and skips tool/editor/build dirs (.claude/,
    # _bmad/, node_modules/, …). Without it, `path: .` sweeps the whole tree and
    # harvest warns about the noise it pulled in.
    # include: ["specs/**", "docs/**", "README.md"]
  - path: ../research-notes              # a sibling checkout on local disk
    include: ["notes/**", "specs/**"]    # optional: narrow to these globs. Omit = whole path in scope.

output:
  # Draft + platform-variant output directory, relative to the host-repo root.
  drafts: articles/drafts/

# Optional: point the Stage-2 interview at your policy repo (product-lab) so it
# can seed tension questions from your recorded positions. Absent = the
# interview runs exactly as before. The read is bounded IN CODE to GLOSSARY.md,
# LESSONS.md, and at most 2 topics/*.md files — never q_a/, never a write — and
# every run pins the repo's commit. An unusable path (missing, unreadable, not
# a git repo) is not a config error: the interview logs one line and degrades
# to generic questions.
# policy_source:
#   path: ../product-lab                 # local checkout; plain path, no URL/sync
#   track: eval-engineering              # optional: article-backlog track; matches topics/<track>*.md
#   topics: [eval-engineering.md]        # optional: explicit override, max 2, basenames only
